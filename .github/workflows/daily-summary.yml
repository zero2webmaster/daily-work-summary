name: Daily Work Summary

on:
  schedule:
    # 10:00 PM EST = 3:00 AM UTC (next day)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily summary
        id: summary
        env:
          PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
        run: |
          python .github/scripts/generate_summary.py
          
          # Check if summary was generated and has content
          TODAY=$(date -u +%Y-%m-%d)
          SUMMARY_FILE="summaries/daily-summary-${TODAY}.md"
          
          if [ -f "$SUMMARY_FILE" ] && [ -s "$SUMMARY_FILE" ]; then
            echo "has_summary=true" >> $GITHUB_OUTPUT
            echo "summary_file=$SUMMARY_FILE" >> $GITHUB_OUTPUT
          else
            echo "has_summary=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit summary to repo
        if: steps.summary.outputs.has_summary == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add summaries/
          git diff --cached --quiet || git commit -m "Add daily summary for $(date -u +%Y-%m-%d)"
          git push

      - name: Send email
        if: steps.summary.outputs.has_summary == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Daily Work Summary — $(date +'%a %b %d')"
          to: kerry@zero2webmaster.com
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: file://${{ steps.summary.outputs.summary_file }}
          convert_markdown: true
