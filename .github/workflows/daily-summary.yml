name: Daily Work Summary

on:
  schedule:
    # 10:00 PM EST = 3:00 AM UTC (next day)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set date for email subject
        id: date
        env:
          EMAIL_TIMEZONE: ${{ vars.EMAIL_TIMEZONE }}
        run: |
          SUBJECT_DATE=$(TZ="${EMAIL_TIMEZONE:-America/New_York}" date +'%a %b %d')
          echo "subject_date=$SUBJECT_DATE" >> $GITHUB_OUTPUT

      - name: Generate daily summary
        id: summary
        env:
          PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DELIVERY_METHOD: ${{ vars.DELIVERY_METHOD }}
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ vars.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_SUMMARIES: ${{ vars.AIRTABLE_TABLE_SUMMARIES }}
          AIRTABLE_TABLE_REPOS: ${{ vars.AIRTABLE_TABLE_REPOS }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python .github/scripts/generate_summary.py

          # Check if summary was generated and has content
          TODAY=$(date -u +%Y-%m-%d)
          SUMMARY_FILE="summaries/daily-summary-${TODAY}.md"

          if [ -f "$SUMMARY_FILE" ] && [ -s "$SUMMARY_FILE" ]; then
            echo "has_summary=true" >> $GITHUB_OUTPUT
            echo "summary_file=$SUMMARY_FILE" >> $GITHUB_OUTPUT
          else
            echo "has_summary=false" >> $GITHUB_OUTPUT
            # send_email defaults to false when there is no summary
            echo "send_email=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit summary to repo
        if: steps.summary.outputs.has_summary == 'true'
        run: |
          git config user.name "Daily Summary Bot"
          git config user.email "daily-summary@users.noreply.github.com"
          git add summaries/
          git diff --cached --quiet || git commit -m "Add daily summary for $(date -u +%Y-%m-%d)"
          git push

      - name: Send email
        if: >-
          steps.summary.outputs.has_summary == 'true' &&
          steps.summary.outputs.send_email == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Daily Work Summary — ${{ steps.date.outputs.subject_date }}"
          to: kerry@zero2webmaster.com
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: file://${{ steps.summary.outputs.summary_file }}
